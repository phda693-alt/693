<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Painel de Senhas - PDV Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#173c68 0,#07111f 55%,#030812 100%);color:#fff;overflow:hidden}.app{height:100%;display:flex;flex-direction:column;padding:18px;gap:14px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px}.brand{display:flex;flex-direction:column;gap:4px}.brand h1{font-size:32px;letter-spacing:1px;color:#28e7ff;text-transform:uppercase}.brand span{color:#a9c8dc;font-size:14px}.clock{text-align:right;color:#d9f8ff}.clock b{font-size:24px;color:#fff}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{background:rgba(255,255,255,.08);border:1px solid rgba(40,231,255,.28);border-radius:18px;padding:14px;box-shadow:0 10px 26px rgba(0,0,0,.25)}.card .label{font-size:13px;color:#8fb4c8;text-transform:uppercase}.card .value{font-size:34px;font-weight:900;color:#28e7ff;margin-top:4px}.main{flex:1;display:grid;grid-template-columns:1.25fr .75fr;gap:14px;min-height:0}.senha-atual{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border-radius:28px;border:2px solid rgba(40,231,255,.45);background:linear-gradient(145deg,rgba(13,42,70,.92),rgba(3,9,18,.94));box-shadow:0 18px 50px rgba(0,0,0,.35),inset 0 0 40px rgba(40,231,255,.08);position:relative;overflow:hidden}.senha-atual:before{content:"";position:absolute;inset:-80px;background:radial-gradient(circle,rgba(40,231,255,.18),transparent 55%);animation:pulse 2s infinite}.senha-atual .caption{font-size:22px;color:#b9edff;text-transform:uppercase;letter-spacing:2px;z-index:1}.senha-atual .numero{font-size:min(24vw,210px);line-height:.9;font-weight:1000;color:#fff;text-shadow:0 0 26px rgba(40,231,255,.85);z-index:1;margin:22px 0}.senha-atual .cliente{font-size:30px;color:#28e7ff;font-weight:bold;z-index:1}.senha-atual .detalhe{font-size:18px;color:#a9c8dc;margin-top:10px;z-index:1}.side{display:flex;flex-direction:column;gap:12px;min-height:0}.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:16px;padding:16px 10px;font-size:15px;font-weight:900;letter-spacing:.5px;cursor:pointer;color:#04101b;background:#28e7ff;box-shadow:0 8px 20px rgba(40,231,255,.22)}.btn.secondary{background:rgba(255,255,255,.10);color:#d9f8ff;border:1px solid rgba(255,255,255,.16)}.btn.danger{background:#ff4d6d;color:#fff}.lista{flex:1;overflow:auto;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.10);border-radius:22px;padding:10px}.item{display:grid;grid-template-columns:82px 1fr auto;gap:12px;align-items:center;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px;margin-bottom:9px}.num{font-size:34px;font-weight:1000;color:#fff;text-align:center}.info b{display:block;font-size:16px;color:#d9f8ff}.info span{display:block;font-size:12px;color:#91aebb;margin-top:3px}.status{font-size:11px;font-weight:900;border-radius:999px;padding:8px 10px;background:rgba(255,193,7,.16);color:#ffd76d}.status.chamada{background:rgba(0,230,118,.16);color:#6dffb1}.empty{text-align:center;color:#95b4c7;padding:40px 10px}.rodape{display:flex;justify-content:space-between;align-items:center;color:#88a8bb;font-size:13px}@keyframes pulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}@media(max-width:820px){.main{grid-template-columns:1fr}.cards{grid-template-columns:repeat(3,1fr)}.brand h1{font-size:22px}.senha-atual .numero{font-size:34vw}.senha-atual .cliente{font-size:22px}.item{grid-template-columns:64px 1fr}.status{grid-column:1/3;text-align:center}.app{overflow:auto}.senha-atual{min-height:330px}.lista{min-height:300px}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="brand"><h1>Painel de Senhas</h1><span>PDV Pro - chamado em tempo real</span></div>
    <div class="clock"><b id="hora">--:--</b><div id="data">--/--/----</div></div>
  </div>
  <div class="cards">
    <div class="card"><div class="label">Aguardando</div><div class="value" id="qtdAguardando">0</div></div>
    <div class="card"><div class="label">Chamadas</div><div class="value" id="qtdChamadas">0</div></div>
    <div class="card"><div class="label">Total</div><div class="value" id="qtdTotal">0</div></div>
  </div>
  <div class="main">
    <section class="senha-atual">
      <div class="caption">Senha chamada</div>
      <div class="numero" id="senhaAtual">--</div>
      <div class="cliente" id="clienteAtual">Aguardando chamada</div>
      <div class="detalhe" id="detalheAtual">Clique em CHAMAR PRÓXIMA</div>
    </section>
    <aside class="side">
      <div class="controls">
        <button class="btn" onclick="chamarProxima()">CHAMAR PRÓXIMA</button>
        <button class="btn secondary" onclick="carregar(true)">ATUALIZAR</button>
        <button class="btn secondary" onclick="ativarTelaCheia()">TELA CHEIA</button>
        <button class="btn secondary" onclick="testarSomVoz()">TESTAR SOM</button>
        <button class="btn danger" onclick="limparPainel()">ZERAR SENHAS</button>
      </div>
      <div class="lista" id="lista"><div class="empty">Nenhuma senha gerada ainda.</div></div>
    </aside>
  </div>
  <div class="rodape"><span id="status">Conectando...</span><span>Atualiza automaticamente a cada 2 segundos</span></div>
</div>
<script>
let ultimoChamado = null;
let primeiraCarga = true;
let audioCtx = null;
let audioLiberado = false;
function relogio(){const d=new Date();document.getElementById('hora').textContent=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});document.getElementById('data').textContent=d.toLocaleDateString('pt-BR');}setInterval(relogio,1000);relogio();
function liberarAudio(){try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();audioLiberado=true;}catch(e){}}
document.addEventListener('click',liberarAudio,{passive:true});
function beepWeb(){try{liberarAudio();if(!audioCtx)return;const tocar=(freq,dur,delay)=>{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.type='sine';o.frequency.value=freq;g.gain.value=.0001;o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime+(delay||0);g.gain.exponentialRampToValueAtTime(.30,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.start(t);o.stop(t+dur+.04);};tocar(880,.18,0);tocar(1320,.32,.25);}catch(e){}}
function falar(txt, senha, cliente){try{beepWeb();if(window.AndroidSenhaVoice&&AndroidSenhaVoice.falarSenha){AndroidSenhaVoice.falarSenha(String(senha||''),String(cliente||''));return;}if('speechSynthesis' in window){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(txt);u.lang='pt-BR';u.rate=.82;u.pitch=1.05;let tentativas=0;const speak=()=>{try{speechSynthesis.speak(u);}catch(e){}};speak();setTimeout(()=>{if(!speechSynthesis.speaking&&tentativas++<2)speak();},350);}}catch(e){}}
function testarSomVoz(){liberarAudio();if(window.AndroidSenhaVoice&&AndroidSenhaVoice.falarSenha){AndroidSenhaVoice.falarSenha('123','Teste de voz');}else{falar('Atenção. Senha 123. Teste de voz.','123','Teste de voz');}document.getElementById('status').textContent='Teste de som e voz enviado';}
async function carregar(silencioso){try{const r=await fetch('/api/senhas?ts='+Date.now(),{cache:'no-store'});const data=await r.json();document.getElementById('qtdAguardando').textContent=data.aguardando||0;document.getElementById('qtdChamadas').textContent=data.chamadas||0;document.getElementById('qtdTotal').textContent=data.total||0;renderLista(data.senhas||[]);document.getElementById('status').textContent='Online • atualizado em '+(data.atualizado_em||'agora');const chamada=(data.senhas||[]).find(s=>s.status==='CHAMADA');if(chamada){mostrarAtual(chamada,false);}else if(!ultimoChamado){mostrarVazio();}primeiraCarga=false;}catch(e){document.getElementById('status').textContent='Falha ao conectar ao servidor local do PDV';}}
function mostrarAtual(s, anunciar){ultimoChamado=s;document.getElementById('senhaAtual').textContent=s.senha;document.getElementById('clienteAtual').textContent=s.cliente||'Cliente nao informado';document.getElementById('detalheAtual').textContent='Venda #'+s.venda_id+' • '+(s.chamado_em||s.criado_em||'');if(anunciar){falar('Atenção. Senha '+s.senha+'. '+(s.cliente||''), s.senha, s.cliente||'');}}
function mostrarVazio(){document.getElementById('senhaAtual').textContent='--';document.getElementById('clienteAtual').textContent='Aguardando chamada';document.getElementById('detalheAtual').textContent='Clique em CHAMAR PRÓXIMA';}
function renderLista(arr){const el=document.getElementById('lista');if(!arr.length){el.innerHTML='<div class="empty">Nenhuma senha gerada ainda.</div>';return;}el.innerHTML=arr.map(s=>`<div class="item" onclick="chamarSenha(${s.venda_id})"><div class="num">${s.senha}</div><div class="info"><b>${escapeHtml(s.cliente||'Cliente nao informado')}</b><span>Venda #${s.venda_id} • Total R$ ${(Number(s.total||0)).toFixed(2).replace('.',',')}</span><span>${s.status==='CHAMADA'?'Chamou: '+(s.chamado_em||'--'):'Criada: '+(s.criado_em||'--')}</span></div><div class="status ${s.status==='CHAMADA'?'chamada':''}">${s.status}</div></div>`).join('');}
async function chamarProxima(){await chamarSenha(0);}async function chamarSenha(vendaId){try{const url=vendaId?'/api/senhas/chamar?vendaId='+encodeURIComponent(vendaId):'/api/senhas/chamar';const r=await fetch(url,{method:'POST'});const data=await r.json();if(data.success){mostrarAtual({senha:data.senha,venda_id:data.venda_id,cliente:data.cliente,status:'CHAMADA'},true);await carregar(true);}else{alert(data.error||'Nenhuma senha para chamar.');}}catch(e){alert('Erro ao chamar senha.');}}
async function limparPainel(){if(!confirm('Zerar as senhas do canhoto e limpar o painel? A proxima senha voltara para 001.'))return;await fetch('/api/senhas/limpar',{method:'POST'});ultimoChamado=null;mostrarVazio();carregar(true);}function ativarTelaCheia(){const e=document.documentElement;if(e.requestFullscreen)e.requestFullscreen();}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
setInterval(()=>carregar(true),2000);carregar(false);
</script>
</body>
</html>
